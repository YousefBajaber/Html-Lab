<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 6: Contact Form</title>
</head>
<body>

    <section id="contact-me">
        <h2>Contact Me</h2>

        <form action="#" method="post">
            
            <fieldset style="border: 2px solid #0056b3; padding: 20px; background-color: #f9f9f9;">
                
                <legend style="background-color: #0056b3; color: white; padding: 5px 15px; font-size: 18px; border: 1px solid #003d82;">
                    Contact Information
                </legend>

                <div>
                    <label for="fullName">Full Name:</label><br>
                    <input type="text" id="fullName" name="fullName" required maxlength="50" placeholder="e.g. Yousef" 
                           style="padding: 8px; border: 1px solid #ccc; font-size: 14px; margin-bottom: 10px;">
                </div>

                <div>
                    <label for="emailAddr">Email Address:</label><br>
                    <input type="email" id="emailAddr" name="emailAddr" required placeholder="name@example.com"
                           style="padding: 8px; border: 1px solid #ccc; margin-bottom: 10px;">
                </div>

                <div>
                    <label for="phoneNum">Phone Number:</label><br>
                    <input type="tel" id="phoneNum" name="phoneNum" placeholder="+60 123 456 789"
                           style="padding: 8px; border: 1px solid #ccc; margin-bottom: 10px;">
                </div>

              

            </fieldset>
        </form>
    </section>

</body>
</html>
