<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 6: Contact Form</title>
</head>
<body>

    <section id="contact-me">
        <h2>Contact Me</h2>

        <form action="#" method="post">
            
            <fieldset style="border: 2px solid #0056b3; padding: 20px; background-color: #f9f9f9;">
                
                <legend style="background-color: #0056b3; color: white; padding: 5px 15px; font-size: 18px; border: 1px solid #003d82;">
                    Contact Information
                </legend>

                <div>
                    <label for="fullName">Full Name:</label><br>
                    <input type="text" id="fullName" name="fullName" required maxlength="50" placeholder="e.g. Yousef" 
                           style="padding: 8px; border: 1px solid #ccc; font-size: 14px; margin-bottom: 10px;">
                </div>

                <div>
                    <label for="emailAddr">Email Address:</label><br>
                    <input type="email" id="emailAddr" name="emailAddr" required placeholder="name@example.com"
                           style="padding: 8px; border: 1px solid #ccc; margin-bottom: 10px;">
                </div>

                <div>
                    <label for="phoneNum">Phone Number:</label><br>
                    <input type="tel" id="phoneNum" name="phoneNum" placeholder="+60 123 456 789"
                           style="padding: 8px; border: 1px solid #ccc; margin-bottom: 10px;">
                </div>

             <div>
                  <div>
                    <label for="age">Your Age:</label><br>
                    <input type="number" id="age" name="age" min="18" max="99" placeholder="18"
                           style="padding: 8px; border: 1px solid #ccc; margin-bottom: 10px;">
                </div>

                <div>
                    <label for="meetingDate">Preferred Meeting Date:</label><br>
                    <input type="date" id="meetingDate" name="meetingDate" style="margin-bottom: 10px;">
                </div>

                <div>
                    <label for="budget">Estimated Budget ($):</label><br>
                    <input type="range" id="budget" name="budget" min="100" max="5000" style="margin-bottom: 15px;">
                </div>

                <div>
                    <label for="subject">Message Subject:</label><br>
                    <select id="subject" name="subject" style="padding: 8px; font-size: 14px; margin-bottom: 15px;">
                        <optgroup label="General Inquiries">
                            <option value="hello">Just saying Hello</option>
                            <option value="feedback"> Feedback</option>
                        </optgroup>
                        <optgroup label="Business">
                            <option value="freelance">Freelance </option>
                            <option value="job">Job Opportunity</option>
                        </optgroup>
                    </select>
                </div>

                <div>
                   
                   <p style="margin-bottom: 5px; font-weight: bold;">Preferred Contact Method:</p>

                    <input type="radio" id="contactEmail" name="contactMethod" value="email" required>

                    <label for="contactEmail">Email</label><br>



                    <input type="radio" id="contactPhone" name="contactMethod" value="phone">

                    <label for="contactPhone">Phone</label><br>



                    <input type="radio" id="contactWhatsapp" name="contactMethod" value="whatsapp">

                    <label for="contactWhatsapp">WhatsApp</label><br>

                </div>

                <br>



              

            </fieldset>
        </form>
    </section>

</body>
</html>
