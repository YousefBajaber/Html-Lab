<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task 4: Academic Results Table</title>
</head>
<body>

                </tr>
                <tr>
                    <td>Advanced Programming</td>

                    <td>A</td>
                </tr>

            <tfoot>
                <tr>
                    <th scope="row" colspan="2">Total Credits / Average Grade</th>

                </tr>

</html>
