<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <title>Task 5: Media — Images & Figures</title>
</head>
<body>

    <section id="profile-section">
        <h2>My Profile</h2>
        
        <figure>
                <!-- Note: align="left" is deprecated in HTML. -->
            <img src="https://placehold.co/150x150/png?text=Profile+Photo" 
                 alt="A professional headshot of the web developer smiling" 
                 width="150" 
                 height="150" 
                 align="left" 
                 title="Hovering over my profile picture!">
            <figcaption>My Profile Photo</figcaption>
        </figure>
             
      <p>
    Hi! I'm a web developer. Welcome to my profile page!
</p>
        <br clear="all">
    </section>

    <hr>

    <section id="project-section">
        <h2>Featured Project</h2>

        <figure>
            <a href="https://github.com" target="_blank">
                <img src="https://placehold.co/600x350/png?text=Project+Screenshot" 
                     alt="A screenshot showing the dashboard of my latest web application" 
                     width="600" 
                     height="350">
            </a>
            <figcaption>Screenshot of my latest web application dashboard. Click the image to visit the live site.</figcaption>
        </figure>
    </section>

</body>
</html>
